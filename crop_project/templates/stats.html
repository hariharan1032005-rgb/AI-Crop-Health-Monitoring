<!DOCTYPE html>
<html>

<head>
<title>Disease Statistics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#e8f5e9;
text-align:center;
margin:0;
}

.nav{
background:#2e7d32;
padding:12px;
}

.nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

h2{
margin-top:30px;
}

canvas{
max-width:600px;
margin:30px auto;
}

.container{
width:80%;
margin:auto;
}

</style>

</head>

<body>

<div class="nav">
<a href="/">Home</a>
<a href="/history">History</a>
<a href="/stats">Statistics</a>
</div>

<div class="container">

<h2>🌿 Disease Detection Statistics</h2>

<canvas id="diseaseChart"></canvas>

<h2>🐛 Pest Risk Statistics</h2>

<canvas id="pestChart"></canvas>

</div>

<script>

const diseaseData = {
labels: {{ diseases | safe }},
datasets: [{
label: 'Disease Count',
data: {{ disease_counts | safe }},
backgroundColor: [
"#66bb6a",
"#42a5f5",
"#ffa726",
"#ef5350",
"#ab47bc"
]
}]
};

const pestData = {
labels: {{ pests | safe }},
datasets: [{
label: 'Pest Risk Count',
data: {{ pest_counts | safe }},
backgroundColor: [
"#26a69a",
"#ff7043",
"#5c6bc0"
]
}]
};

new Chart(document.getElementById("diseaseChart"), {
type: "pie",
data: diseaseData
});

new Chart(document.getElementById("pestChart"), {
type: "bar",
data: pestData
});

</script>

</body>

</html>
