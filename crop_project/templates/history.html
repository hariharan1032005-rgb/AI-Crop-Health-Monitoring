<!DOCTYPE html>
<html>

<head>
<title>Prediction History</title>

<style>

body{
font-family:Arial;
background:#f1f8e9;
text-align:center;
margin:0;
padding:0;
}

h2{
background:#4CAF50;
color:white;
padding:15px;
margin:0;
}

table{
margin:30px auto;
border-collapse:collapse;
width:90%;
background:white;
box-shadow:0 0 10px gray;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#4CAF50;
color:white;
}

tr:hover{
background:#f5f5f5;
}

img{
width:80px;
border-radius:5px;
}

</style>

</head>

<body>

<h2>Prediction History Dashboard</h2>

<table>

<tr>
<th>ID</th>
<th>Leaf Image</th>
<th>Disease</th>
<th>Pest Risk</th>
<th>Confidence</th>
<th>Solution</th>
</tr>

{% for row in data %}

<tr>
<td>{{row[0]}}</td>

<td>
<img src="/uploads/{{row[1]}}">
</td>

<td>{{row[2]}}</td>

<td>{{row[3]}}</td>

<td>{{row[4]}} %</td>

<td>{{row[5]}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
